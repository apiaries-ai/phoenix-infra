services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: apiaries_cloudflared
    profiles:
      - tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate --protocol http2 run --token eyJhIjoiMTIzNDU3ZmFmZjM1MjQzZjRjZmU5YzU5YmI3MmNjNzkiLCJzIjoiQis3dzY2aUp5dnNGUm93ZnlvWVczaGxZTmQvcW1ING9PTHcwbnYzaXlkQT0iLCJ0IjoiM2ZiYmIyM2QtOTdhYy00YzcyLTlkMjktNTliMDM2MjlhNjZiIn0=
    networks:
      - hive
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "2"
  backend:
    image: apiaries-backend:local
    container_name: apiaries_backend
    profiles:
      - local-dev
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: apiaries
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/apiaries
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: "1440"
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
    volumes:
      - .:/app
      - /app/__pycache__
      - /app/.venv
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hive
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "1"
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.create_connection(('localhost',8000),2); s.close()\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"
  frontend:
    image: nginx:alpine
    container_name: apiaries_frontend
    volumes:
      - ./design-os:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"
    networks:
      - hive
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 2
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "2"
  postgres:
    image: postgres:16-alpine
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    container_name: apiaries_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: apiaries
      POSTGRES_INITDB_ARGS: "-c shared_buffers=256MB -c effective_cache_size=1GB -c work_mem=64MB"
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - hive
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "2"
networks:
  hive:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-apiaries
      com.docker.driver.mtu: 1500
volumes:
  pgdata:
    name: apiariesai_pgdata
    external: true
