version: '3'

services:
  db:
    image: postgres:16-alpine
    restart: always
    volumes:
      - db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: nextcloud
      POSTGRES_USER: nextcloud
      POSTGRES_PASSWORD: Lexry2024SecureChangeMe  # ← CHANGE THIS
    networks:
      - nextcloud_net

  app:
    image: nextcloud:apache
    restart: always
    ports:
      - 8080:80
    volumes:
      - nextcloud_data:/var/www/html
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: nextcloud
      POSTGRES_USER: nextcloud
      POSTGRES_PASSWORD: Lexry2024SecureChangeMe
      NEXTCLOUD_ADMIN_USER: admin
      NEXTCLOUD_ADMIN_PASSWORD: BienHive2026!   # ← CHANGE THIS
      NEXTCLOUD_TRUSTED_DOMAINS: 192.168.1.69 localhost nextcloud.apiaries.ai
    depends_on:
      - db
    networks:
      - nextcloud_net

volumes:
  db_data:
  nextcloud_data:

networks:
  nextcloud_net:
