services:
  mattermost:
    image: mattermost/mattermost-team-edition:latest
    container_name: mattermost
    restart: unless-stopped
    privileged: true
    ports:
      - "8065:8065"
      - "8443:8443/udp"
      - "8443:8443/tcp"
    volumes:
      - ./config:/mattermost/config:rw
      - ./data:/mattermost/data:rw
      - ./logs:/mattermost/logs:rw
      - ./plugins:/mattermost/plugins:rw
      - ./client-plugins:/mattermost/client/plugins:rw
      - ./bleve-indexes:/mattermost/bleve-indexes:rw
    environment:
      TZ: America/Chicago
      MM_SQLSETTINGS_DRIVERNAME: postgres
      MM_SQLSETTINGS_DATASOURCE: postgres://hivemaster:Lexry2024@host.docker.internal:5432/mattermost?sslmode=disable&connect_timeout=10
      MM_SERVICESETTINGS_SITEURL: https://chat.apiaries.ai
      MM_BLEVESETTINGS_INDEXDIR: /mattermost/bleve-indexes
      MM_BLEVESETTINGS_ENABLEINDEXING: "true"
      MM_BLEVESETTINGS_ENABLESEARCHING: "true"
      MM_BLEVESETTINGS_ENABLEAUTOCOMPLETE: "true"
      MM_LOGSETTINGS_ENABLEDIAGNOSTICS: "false"
      MM_SERVICESETTINGS_ENABLELOCALMODE: "true"
      MM_PLUGINSETTINGS_ENABLEUPLOADS: "true"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    tmpfs:
      - /tmp
