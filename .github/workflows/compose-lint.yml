name: compose-lint
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: Validate compose files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install --quiet pyyaml

      - name: Validate YAML syntax for all compose files
        run: |
          set -euo pipefail
          shopt -s nullglob
          fail=0
          for f in stacks/*/docker-compose.yml stacks/*/docker-compose.yaml; do
            echo "::group::yaml-load $f"
            if python -c "import sys, yaml; yaml.safe_load(open(sys.argv[1]))" "$f"; then
              echo "ok: $f"
            else
              echo "::error file=$f::Invalid YAML"
              fail=1
            fi
            echo "::endgroup::"
          done
          exit $fail

      - name: Check container_name uniqueness across stacks
        run: |
          set -euo pipefail
          python - <<'PY'
          import glob, sys, yaml, collections
          seen = collections.defaultdict(list)
          files = sorted(glob.glob("stacks/*/docker-compose.yml") +
                         glob.glob("stacks/*/docker-compose.yaml"))
          skipped = []
          for f in files:
              with open(f) as fh:
                  data = yaml.safe_load(fh)
              # Stub/placeholder compose files (empty or non-mapping) are
              # tolerated: skip with a warning rather than failing the lint.
              if not isinstance(data, dict):
                  skipped.append(f)
                  print(f"::warning file={f}::skipping non-mapping compose file (stub/placeholder)")
                  continue
              for svc_name, svc in (data.get("services") or {}).items():
                  if not isinstance(svc, dict):
                      continue
                  # Profile-gated services are opt-in (compose --profile) and
                  # not started by a default `up`, so duplicate container_name
                  # values are by design (e.g. orphan-snapshot stacks that
                  # mirror a service already declared in the trunk compose).
                  if svc.get("profiles"):
                      continue
                  cn = svc.get("container_name")
                  if cn:
                      seen[cn].append(f"{f}:{svc_name}")
          dupes = {k: v for k, v in seen.items() if len(v) > 1}
          if dupes:
              print("Duplicate container_name values across stacks:")
              for cn, locs in dupes.items():
                  print(f"  {cn}: " + ", ".join(locs))
              sys.exit(1)
          print(f"OK: {len(seen)} unique container_name values across "
                f"{len(files) - len(skipped)} compose files "
                f"({len(skipped)} stubs skipped)")
          PY

      - name: docker compose config (per stack)
        run: |
          set -euo pipefail
          shopt -s nullglob
          fail=0
          for d in stacks/*/; do
            f=""
            if [ -f "$d/docker-compose.yml" ]; then
              f="$d/docker-compose.yml"
            elif [ -f "$d/docker-compose.yaml" ]; then
              f="$d/docker-compose.yaml"
            fi
            [ -z "$f" ] && continue
            # Skip stub/placeholder compose files (top-level not a YAML mapping).
            if ! python -c "import sys, yaml; d=yaml.safe_load(open(sys.argv[1])); sys.exit(0 if isinstance(d, dict) else 2)" "$f"; then
              echo "::warning file=$f::skipping docker compose config (stub/placeholder)"
              continue
            fi
            echo "::group::compose config $f"
            if ! docker compose -f "$f" --env-file /dev/null config -q 2>&1; then
              echo "::error file=$f::compose config failed"
              fail=1
            fi
            echo "::endgroup::"
          done
          exit $fail
