name: compose-lint
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: Validate compose files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install --quiet pyyaml

      - name: Validate YAML syntax for all compose files
        run: |
          set -euo pipefail
          shopt -s nullglob
          fail=0
          for f in stacks/*/docker-compose.yml stacks/*/docker-compose.yaml; do
            echo "::group::yaml-load $f"
            if python -c "import sys, yaml; yaml.safe_load(open(sys.argv[1]))" "$f"; then
              echo "ok: $f"
            else
              echo "::error file=$f::Invalid YAML"
              fail=1
            fi
            echo "::endgroup::"
          done
          exit $fail

      - name: Check container_name uniqueness across stacks
        run: |
          set -euo pipefail
          python - <<'PY'
          import glob, sys, yaml, collections
          seen = collections.defaultdict(list)
          files = sorted(glob.glob("stacks/*/docker-compose.yml") +
                         glob.glob("stacks/*/docker-compose.yaml"))
          for f in files:
              with open(f) as fh:
                  data = yaml.safe_load(fh) or {}
              for svc_name, svc in (data.get("services") or {}).items():
                  if not isinstance(svc, dict):
                      continue
                  cn = svc.get("container_name")
                  if cn:
                      seen[cn].append(f"{f}:{svc_name}")
          dupes = {k: v for k, v in seen.items() if len(v) > 1}
          if dupes:
              print("Duplicate container_name values across stacks:")
              for cn, locs in dupes.items():
                  print(f"  {cn}: " + ", ".join(locs))
              sys.exit(1)
          print(f"OK: {len(seen)} unique container_name values across {len(files)} compose files")
          PY

      - name: docker compose config (per stack)
        run: |
          set -euo pipefail
          shopt -s nullglob
          fail=0
          for d in stacks/*/; do
            if [ -f "$d/docker-compose.yml" ] || [ -f "$d/docker-compose.yaml" ]; then
              echo "::group::compose config $d"
              if ! docker compose -f "$d"/docker-compose.y*ml --env-file /dev/null config -q 2>&1; then
                echo "::error file=$d::compose config failed"
                fail=1
              fi
              echo "::endgroup::"
            fi
          done
          exit $fail
