name: drift-check
on:
  schedule:
    - cron: '0 */6 * * *'
  push:
  workflow_dispatch:
    inputs:
      ignore:
        description: 'Comma-separated service/container names to ignore'
        required: false
        default: ''

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install yq
        env:
          YQ_VERSION: v4.44.3
          YQ_SHA256: a2c097180dd884a8d50c956ee16a9cec070f30a7947cf4ebf87d5f36213e9ed7
        run: |
          wget -q "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64" -O yq
          echo "${YQ_SHA256}  yq" | sha256sum -c -
          chmod +x yq
          mkdir -p "$RUNNER_TEMP/bin"
          mv yq "$RUNNER_TEMP/bin/yq"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
          export PATH="$RUNNER_TEMP/bin:$PATH"
          yq --version

      - name: Install bats-core
        run: |
          git clone --depth 1 --branch v1.11.1 https://github.com/bats-core/bats-core.git /tmp/bats-core
          sudo /tmp/bats-core/install.sh /usr/local
          bats --version

      - name: Run drift-check tests
        run: bats scripts/tests/drift-check.bats

  check:
    runs-on: self-hosted
    env:
      DRIFT_IGNORE: ${{ inputs.ignore || '' }}
    steps:
      - uses: actions/checkout@v5

      - name: Install yq
        env:
          YQ_VERSION: v4.44.3
          YQ_SHA256: a2c097180dd884a8d50c956ee16a9cec070f30a7947cf4ebf87d5f36213e9ed7
        run: |
          wget -q "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64" -O yq
          echo "${YQ_SHA256}  yq" | sha256sum -c -
          chmod +x yq
          mkdir -p "$RUNNER_TEMP/bin"
          mv yq "$RUNNER_TEMP/bin/yq"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
          export PATH="$RUNNER_TEMP/bin:$PATH"
          yq --version

      - name: Check declared stacks are running
        run: bash scripts/drift-check.sh
