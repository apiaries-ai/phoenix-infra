name: drift-check
on:
  schedule:
    - cron: '0 */6 * * *'
  push:

jobs:
  check:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Check declared stacks are running
        run: |
          grep -h "container_name:" stacks/*/docker-compose.yml | awk '{print $2}' | sort -u > /tmp/expected.txt
          docker ps --format "{{.Names}}" | sort -u > /tmp/running.txt
          MISSING=""
          while read svc; do
            grep -qFx "$svc" /tmp/running.txt || MISSING="$MISSING $svc"
          done < /tmp/expected.txt
          if [ -z "$MISSING" ]; then
            echo "✅ All declared services running"
          else
            echo "❌ Declared but not running:$MISSING"
            exit 1
          fi
